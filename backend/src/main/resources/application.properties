# Application Name
spring.application.name=bg-remover

# Server Port
server.port=8080

# =====================
# DATABASE CONFIGURATION
# =====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.show-sql=true

# =====================
# JWT CONFIGURATION
# =====================
# Change this secret to a long random string in production
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# =====================
# REMOVE.BG API KEY
# =====================
removebg.api.key=${REMOVE_BG_API_KEY}
removebg.api.url=https://api.remove.bg/v1.0/removebg

# =====================
# FILE UPLOAD SETTINGS
# =====================
# Max file size allowed
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Folder where images will be saved locally
app.upload.dir=uploads

# =====================
# OAUTH2 - GOOGLE LOGIN
# =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=email,profile

# =====================
# OAUTH2 - GITHUB LOGIN
# =====================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
# spring.security.oauth2.client.registration.github.scope=user:email

# =====================
# FRONTEND URL (for CORS)
# =====================
app.frontend.url=http://localhost:3000
